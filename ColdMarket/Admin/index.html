<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">Admin Panel</div>
            <nav>
                <ul>
                    <li><a href="index.html" class="active">📊 Dashboard</a></li>
                    <li><a href="products.html">🛍️ Products</a></li>
                    <li><a href="users.html">👥 Users</a></li>
                    <li><a href="#">📦 Orders</a></li>
                    <li><a href="#">⚙️ Settings</a></li>
                    <li><a href="#" id="logout-btn">🚪 Logout</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <h1>Dashboard</h1>
                <div class="user-info">
                    <span id="admin-username">Loading...</span>
                    <img src="https://via.placeholder.com/40" alt="Admin Avatar" id="admin-avatar">
                </div>
            </header>

            <div class="stats-container">
                <div class="stat-card">
                    <h3>Total Products</h3>
                    <p class="stat-value" id="total-products">--</p>
                </div>
                <div class="stat-card">
                    <h3>Total Users</h3>
                    <p class="stat-value" id="total-users">--</p>
                </div>
                <div class="stat-card">
                    <h3>Total Orders</h3>
                    <p class="stat-value" id="total-orders">--</p>
                </div>
                <div class="stat-card">
                    <h3>Revenue</h3>
                    <p class="stat-value" id="total-revenue">--</p>
                </div>
            </div>

            <div class="recent-activity">
                <h2>Recent Activity</h2>
                <div class="activity-list" id="activity-list">
                    <div class="activity-item loading">
                        Loading recent activity...
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
